<!-- activity.html -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>

<div class="card shadow-sm">
  <div class="card-header bg-white d-flex justify-content-between align-items-center">
    <h5 class="mb-0 text-primary"><i class="fa fa-calendar-alt"></i> ปฏิทินกิจกรรมนักศึกษา</h5>
    <button class="btn btn-sm btn-success" onclick="openAddModal()">
      <i class="fa fa-plus"></i> เพิ่มกิจกรรมใหม่
    </button>
  </div>
  <div class="card-body">
    <div id="calendar"></div>
  </div>
</div>

<script>
  function initCalendar() {
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      locale: 'th',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,listMonth'
      },
      events: function(fetchInfo, successCallback, failureCallback) {
        google.script.run.withSuccessHandler(res => {
          if(res.success) {
            const events = res.data.map(act => ({
              id: act.actId,
              title: act.name,
              start: act.date,
              extendedProps: {
                location: act.location,
                type: act.type
              }
            }));
            successCallback(events);
          }
        }).getActivities();
      },
      eventClick: function(info) {
        alert('กิจกรรม: ' + info.event.title + '\nสถานที่: ' + info.event.extendedProps.location);
      }
    });
    calendar.render();
  }

  // เรียกใช้งานเมื่อโหลดไฟล์สำเร็จ
  setTimeout(initCalendar, 100);
</script>

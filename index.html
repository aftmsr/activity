<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script>
    // Configuration for Decoupled Web App
    const BACKEND_API_URL = "https://script.google.com/macros/s/AKfycbxhos3WZiIDJic5qZUrrFsWh9kkC4894SyjLiYdEYV8J1ggpw8Zv0G1ovcXhW1eYcqn/exec";

    function callServer(functionName, args = []) {
      return fetch(BACKEND_API_URL, {
        method: "POST",
        mode: "cors",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          functionName: functionName,
          arguments: args
        })
      })
      .then(response => {
        if (!response.ok) {
          throw new Error("HTTP error " + response.status);
        }
        return response.json();
      });
    }

    // Mock google.script.run using ES6 Proxy
    window.google = window.google || {};
    window.google.script = window.google.script || {};
    window.google.script.run = new Proxy({}, {
      get: function(target, prop) {
        if (prop === "withSuccessHandler") {
          return function(callback) {
            window.google.script.run._successHandler = callback;
            return window.google.script.run;
          };
        }
        if (prop === "withFailureHandler") {
          return function(callback) {
            window.google.script.run._failureHandler = callback;
            return window.google.script.run;
          };
        }
        
        // Return a function dynamically for the requested backend method name
        return function(...args) {
          const successHandler = window.google.script.run._successHandler || (() => {});
          const failureHandler = window.google.script.run._failureHandler || (err => console.error("Server Error:", err));
          
          // Clear callbacks for the next execution
          window.google.script.run._successHandler = null;
          window.google.script.run._failureHandler = null;
          
          callServer(prop, args)
            .then(res => {
              if (res && res.success === false) {
                failureHandler(res.error || "Unknown server error");
              } else {
                successHandler(res.result !== undefined ? res.result : res);
              }
            })
            .catch(err => {
              failureHandler(err);
            });
        };
      }
    });
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
  <!-- Google Identity Services Library -->
  <script src="https://accounts.google.com/gsi/client" onload="onGoogleLibraryLoad()"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; overflow-x: hidden; }
    .sidebar { height: 100vh; background: #1a252f; color: white; position: fixed; width: 260px; transition: 0.3s; z-index: 1000; }
    .content { margin-left: 260px; padding: 30px; transition: 0.3s; }
    .nav-link { color: #95a5a6; cursor: pointer; padding: 12px 20px; border-radius: 0; transition: 0.2s; border-left: 4px solid transparent; }
    .nav-link:hover, .nav-link.active { color: white; background: #2c3e50; border-left: 4px solid #3498db; }
    .nav-link i { margin-right: 10px; width: 20px; text-align: center; }
    .user-info { padding: 20px; background: #121920; border-bottom: 1px solid #2c3e50; }
    .hidden { display: none !important; }
    .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    @media (max-width: 768px) { .sidebar { left: -260px; } .sidebar.active { left: 0; } .content { margin-left: 0; } }
  </style>
</head>
<body>

  <div id="loader" class="loader hidden"><div class="spinner-border text-primary"></div></div>

  <!-- Login Section -->
  <div id="loginSection" class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-lg border-0">
          <div class="card-body p-5 text-center">
            <img src="logo.png" alt="Logo" style="width: 100px;" class="mb-4">
            <h4 class="fw-bold mb-4">ระบบบริหารจัดการกิจกรรม</h4>
            <p class="text-muted mb-4">วิทยาลัยการอาชีพแม่สะเรียง</p>
            <input type="email" id="email" class="form-control mb-3" placeholder="อีเมลแอดเดรส">
            <input type="password" id="password" class="form-control mb-4" placeholder="รหัสผ่าน">
            <button onclick="handleLogin()" class="btn btn-primary w-100 py-2">เข้าสู่ระบบ</button>
            <div class="my-3 text-muted">หรือ</div>
            <!-- Google Sign-In Button Container -->
            <div id="g_id_signin_btn" class="d-flex justify-content-center"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="mainLayout" class="hidden">
    <div class="sidebar" id="sidebar">
      <div class="user-info text-center">
        <div class="avatar mb-2"><i class="fa fa-user-circle fa-3x"></i></div>
        <div id="userName" class="fw-bold">User Name</div>
        <small id="userRole" class="text-info text-uppercase">Role</small>
        <div id="userDept" class="small text-muted mt-1">Department</div>
        <div id="userPos" class="small text-warning">Position</div>
        <div id="studentProgress" class="mt-3 px-3 hidden">
          <div class="progress" style="height: 12px; background: #2c3e50;">
            <div id="progBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
          </div>
          <small id="progText" class="text-white-50 mt-1 d-block" style="font-size: 0.7rem;">กำลังโหลดข้อมูลกิจกรรม...</small>
        </div>
      </div>
      <nav class="nav flex-column mt-3" id="menuList">
        <!-- Dynamic Menu -->
      </nav>
      <div style="position: absolute; bottom: 0; width: 100%; p: 10px;">
        <button onclick="handleLogout()" class="nav-link w-100 text-start border-0 bg-transparent text-danger">
          <i class="fa fa-sign-out-alt"></i> ออกจากระบบ
        </button>
      </div>
    </div>

    <div class="content">
      <div id="dynamicContent"></div>
    </div>
  </div>

  <script>
    let currentUser = null;

    function showLoader(show) {
      document.getElementById('loader').classList.toggle('hidden', !show);
    }

    function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        alert('กรุณากรอกอีเมลและรหัสผ่าน');
        return;
      }

      showLoader(true);
      google.script.run
        .withSuccessHandler(res => {
          showLoader(false);
          if(res.success) {
            currentUser = res.user;
            initUI();
          } else {
            alert(res.message);
          }
        })
        .login(email, password);
    }

    // ฟังก์ชันรับข้อมูลหลังจาก Google ยืนยันตัวตนสำเร็จ
    function onGoogleSignIn(response) {
      showLoader(true);
      google.script.run
        .withSuccessHandler(res => {
          showLoader(false);
          if(res.success) {
            currentUser = res.user;
            initUI();
          } else {
            alert(res.message);
          }
        })
        .loginWithGoogle(response.credential); // ส่ง ID Token ไปยัง Server
    }

    function initUI() {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('mainLayout').classList.remove('hidden');
      document.getElementById('userName').innerText = currentUser.name;
      document.getElementById('userRole').innerText = currentUser.role;
      document.getElementById('userDept').innerText = currentUser.department || '-';
      document.getElementById('userPos').innerText = currentUser.position || '-';
      renderMenu();
      if (currentUser.role === 'STUDENT') {
        updateStudentProgress();
      }
      loadPage('DASHBOARD');
    }

    function updateStudentProgress() {
      const progDiv = document.getElementById('studentProgress');
      progDiv.classList.remove('hidden');
      google.script.run.withSuccessHandler(res => {
        if(res.success) {
          const bar = document.getElementById('progBar');
          const txt = document.getElementById('progText');
          bar.style.width = res.percentage + '%';
          bar.className = `progress-bar progress-bar-striped progress-bar-animated ${res.status === 'ผ่าน' ? 'bg-success' : 'bg-danger'}`;
          txt.innerHTML = `เทอม ${res.term}: <b class="${res.status === 'ผ่าน' ? 'text-success' : 'text-danger'}">${res.status}</b> (${res.count}/${res.total})`;
        }
      }).getStudentActivityStatus(currentUser.userId);
    }

    function renderMenu() {
      const menu = document.getElementById('menuList');
      let html = `<a class="nav-link active" onclick="loadPage('DASHBOARD')"><i class="fa fa-th-large"></i> แผงควบคุม</a>`;
      
      if(['ADMIN', 'STAFF'].includes(currentUser.role)) {
        html += `<a class="nav-link" onclick="loadPage('ACTIVITY')"><i class="fa fa-calendar-alt"></i> กิจกรรม</a>`;
        html += `<a class="nav-link" onclick="loadPage('PROJECTS')"><i class="fa fa-tasks"></i> โครงการและชมรม</a>`;
        html += `<a class="nav-link" onclick="loadPage('HOLIDAYS')"><i class="fa fa-umbrella-beach"></i> ตั้งค่าวันหยุด</a>`;
        html += `<a class="nav-link" onclick="loadPage('REMEDIATION')"><i class="fa fa-tools"></i> ซ่อมกิจกรรม</a>`;
        html += `<a class="nav-link" onclick="loadPage('REPORT')"><i class="fa fa-chart-line"></i> รายงานสถิติ (ภาพรวม)</a>`;
        html += `<a class="nav-link" onclick="loadPage('REPORT_SUMMARY')"><i class="fa fa-file-alt"></i> รายงานสรุป</a>`;
      }
      if(['ADMIN', 'อวท.'].includes(currentUser.role)) {
        html += `<a class="nav-link" onclick="loadPage('SCANNER')"><i class="fa fa-qrcode"></i> สแกนเช็คชื่อ</a>`;
      }
      if(currentUser.role === 'STUDENT') {
        html += `<a class="nav-link" onclick="loadPage('APPEAL')"><i class="fa fa-edit"></i> ยื่นอุทธรณ์</a>`;
      }
      if(currentUser.role === 'ADMIN') {
        html += `<a class="nav-link" onclick="loadPage('ADMIN_LOG')"><i class="fa fa-history"></i> ประวัติการใช้งาน</a>`;
        html += `<a class="nav-link" onclick="loadPage('MEMBERS')"><i class="fa fa-users-cog"></i> จัดการสมาชิก</a>`;
        html += `<a class="nav-link" onclick="loadPage('PROMOTION')"><i class="fa fa-graduation-cap"></i> เลื่อนชั้นปี</a>`;
        html += `<a class="nav-link" onclick="loadPage('REPORT_TEMPLATES')"><i class="fa fa-file-invoice"></i> จัดการแม่แบบรายงาน</a>`;
        html += `<a class="nav-link" onclick="loadPage('SETTINGS')"><i class="fa fa-cogs"></i> ตั้งค่าระบบ</a>`;
      }
      menu.innerHTML = html;
    }

    function executeScripts(container) {
      const scripts = container.querySelectorAll("script");
      scripts.forEach(oldScript => {
        const newScript = document.createElement("script");
        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
        oldScript.parentNode.replaceChild(newScript, oldScript);
      });
    }

    function loadPage(page) {
      const container = document.getElementById('dynamicContent');
      showLoader(true);
      
      // Update active menu
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      
      // Find the menu item with page name to make active
      document.querySelectorAll('.nav-link').forEach(el => {
        if (el.getAttribute('onclick') && el.getAttribute('onclick').includes(page)) {
          el.classList.add('active');
        }
      });

      fetch(page.toLowerCase() + '.html')
        .then(res => {
          if (!res.ok) throw new Error("Failed to load page " + page);
          return res.text();
        })
        .then(html => {
          container.innerHTML = html;
          executeScripts(container);
          showLoader(false);
        })
        .catch(err => {
          console.error(err);
          container.innerHTML = `<div class="alert alert-danger mt-3">เกิดข้อผิดพลาดในการโหลดหน้าเว็บ: ${err.message}</div>`;
          showLoader(false);
        });
    }

    function handleLogout() {
      google.script.run.withSuccessHandler(() => location.reload()).logout();
    }

    // Fetch Google Client ID and initialize Google Sign-In dynamically with race condition safety
    let googleLibraryReady = false;
    let fetchedClientId = null;

    function renderGoogleButton() {
      if (fetchedClientId && googleLibraryReady) {
        if (window.google && window.google.accounts) {
          window.google.accounts.id.initialize({
            client_id: fetchedClientId,
            callback: onGoogleSignIn
          });
          window.google.accounts.id.renderButton(
            document.getElementById("g_id_signin_btn"),
            { theme: "outline", size: "large", width: "100%" }
          );
        }
      }
    }

    function onGoogleLibraryLoad() {
      googleLibraryReady = true;
      renderGoogleButton();
    }

    window.addEventListener('DOMContentLoaded', () => {
      google.script.run
        .withSuccessHandler(clientId => {
          if (clientId) {
            fetchedClientId = clientId;
            renderGoogleButton();
          }
        })
        .withFailureHandler(err => console.error("Error fetching client ID:", err))
        .getGoogleClientId();
    });
  </script>
</body>
</html>
